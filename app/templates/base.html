<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StudyBuddy</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
  body.dark-mode {
    background-color: #121212;
    color: #f1f1f1;
  }
  .dark-mode .navbar,
  .dark-mode .card,
  .dark-mode .table,
  .dark-mode .list-group-item {
    background-color: #1e1e1e;
    color: #eee;
  }
</style>

</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="/">StudyBuddy</a>
      <div>
        <a href="/login" class="btn btn-light btn-sm me-2">Login</a>
        <a href="/register" class="btn btn-light btn-sm">Register</a>
        <a class="navbar-brand" href="/">StudyBuddy</a>
      </div>
    </div>
    <div class="position-fixed bottom-0 end-0 p-3">
  <button onclick="toggleDarkMode()" class="btn btn-sm btn-dark">🌓 Dark Mode</button>
</div>

<script>
function toggleDarkMode() {
  document.body.classList.toggle("dark-mode");
}
</script>

  </nav>
  <div class="container mt-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </div>
</body>
</html>
